name: Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: ['10.0.x']

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Run tests
      run: dotnet test -c Release --no-build --verbosity normal

    - name: Run code analysis
      run: dotnet analyzers

    - name: Format check
      run: dotnet format --verify-no-changes

  performance-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Build Release
      run: dotnet build -c Release

    - name: Run performance benchmark
      run: |
        dotnet run -c Release --project . -- --benchmark

    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ runner.os }}
        path: BenchmarkDotNet.Artifacts/

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Run security scan
      run: |
        dotnet list package --vulnerable

    - name: Dependency check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'dotnet-realtime-pipeline'
        path: '.'
        format: 'JSON'
        args: >
          --enableProjectReference

    - name: Upload dependency check results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dependency-check-report
        path: dependency-check-report.json

  docker-build:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: dotnet-realtime-pipeline:latest

  coverage:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Install coverage tools
      run: |
        dotnet tool install --global coverlet.console
        dotnet tool install --global ReportGenerator

    - name: Run tests with coverage
      run: dotnet test -c Release /p:CollectCoverage=true /p:CoverletOutput=TestResults/ /p:CoverletOutputFormat=opencover

    - name: Generate coverage report
      run: reportgenerator "-reports:TestResults/coverage.opencover.xml" "-targetdir:coverage" "-reporttypes:Html"

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./TestResults/coverage.opencover.xml
        flags: unittests
        name: codecov-umbrella

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/

  package:
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Build Release Package
      run: dotnet build -c Release

    - name: Create NuGet package
      run: dotnet pack -c Release --output ./artifacts

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: packages
        path: artifacts/

    - name: Publish to NuGet
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet nuget push "artifacts/**/*.nupkg" -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json
